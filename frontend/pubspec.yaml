name: expense_tracker
description: Expense & Budget Tracking Application
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Networking
  http: ^1.2.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # Routing
  go_router: ^14.0.0

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
